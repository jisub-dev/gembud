name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gembud_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew
        working-directory: backend

      - name: Run checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
        working-directory: backend

      - name: Run backend tests
        run: ./gradlew test --continue
        working-directory: backend

      - name: Check coverage threshold
        run: ./gradlew jacocoTestReport jacocoTestCoverageVerification
        working-directory: backend

      - name: Upload backend test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/build/reports/tests/
            backend/build/test-results/

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test -- --run
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npm run e2e
        working-directory: frontend

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  openapi-drift:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew
        working-directory: backend

      - name: Generate OpenAPI spec
        run: ./gradlew generateOpenApiDocs
        working-directory: backend

      - name: Check for drift
        run: |
          if ! git diff --exit-code docs/openapi.json; then
            echo "::error::OpenAPI spec is out of date. Run './gradlew generateOpenApiDocs' from backend/ and commit docs/openapi.json."
            exit 1
          fi
