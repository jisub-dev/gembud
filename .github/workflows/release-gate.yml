name: Release Gate Tests

# Trigger on pull requests to main branch
on:
  pull_request:
    branches: [main]

jobs:
  release-gate:
    name: Release Gate 0.1
    runs-on: ubuntu-latest

    # Use PostgreSQL for integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gembud_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew
        working-directory: .

      - name: Run Release 0.1 Gate Tests
        run: ./gradlew test --tests "*ReleaseGateTest"
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/gembud_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Fail if any test fails
        if: failure()
        run: |
          echo "❌ Release Gate 실패. 출시 불가능."
          exit 1

      - name: Success
        if: success()
        run: echo "✅ Release Gate 통과. 출시 준비 완료."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-test-results
          path: backend/build/reports/tests/
