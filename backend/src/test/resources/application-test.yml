spring:
  datasource:
    # Testcontainers by default; override via env vars for direct-PostgreSQL CI environments
    url: ${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:16:///testdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.testcontainers.jdbc.ContainerDatabaseDriver}
    username: ${SPRING_DATASOURCE_USERNAME:test}
    password: ${SPRING_DATASOURCE_PASSWORD:test}

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: email, profile

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-at-least-256-bits-long-for-hs256-algorithm-testing
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.gembud: DEBUG
