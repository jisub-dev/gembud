spring:
  datasource:
    url: jdbc:h2:mem:docsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: docs-client-id
            client-secret: docs-client-secret
            scope: profile, email
          discord:
            client-id: docs-client-id
            client-secret: docs-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: identify, email
        provider:
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

jwt:
  secret: docs-secret-key-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

server:
  port: 8080
  servlet:
    context-path: /api

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
