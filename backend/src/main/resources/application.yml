spring:
  application:
    name: gembud-backend

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

app:
  feature:
    premium:
      enabled: ${FEATURE_PREMIUM_ENABLED:false}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAMESITE:Lax}
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    slack-webhook-url: ${SECURITY_ALERT_WEBHOOK_URL:}
    report-duplicate-block-days: ${REPORT_DUPLICATE_BLOCK_DAYS:7}
    login-lock-threshold: ${LOGIN_LOCK_THRESHOLD:10}
    login-lock-window-minutes: ${LOGIN_LOCK_WINDOW_MINUTES:10}
    login-lock-duration-minutes: ${LOGIN_LOCK_DURATION_MINUTES:10}
    login-fail-burst-high-threshold: ${LOGIN_FAIL_BURST_HIGH_THRESHOLD:10}
    login-fail-burst-critical-threshold: ${LOGIN_FAIL_BURST_CRITICAL_THRESHOLD:30}
    security-event-retention-days: ${SECURITY_EVENT_RETENTION_DAYS:90}
  admin:
    email: ${APP_ADMIN_EMAIL:}

logging:
  level:
    root: INFO
    com.gembud: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.csrf: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,beans
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

ads:
  daily-view-limit: ${ADS_DAILY_VIEW_LIMIT:5}

sentry:
  enabled: false  # disabled by default in dev/test; prod profile overrides via SENTRY_DSN

# Resilience4j — circuit breaker + retry for outbound HTTP calls (Slack webhook)
resilience4j:
  circuitbreaker:
    instances:
      slack:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50         # open after 50% failures in the window
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.lang.Exception
  retry:
    instances:
      slack:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 3  # 2s, 6s, 18s
        retry-exceptions:
          - java.lang.Exception
