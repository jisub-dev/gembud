spring:
  application:
    name: gembud-backend

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/auth/callback}

logging:
  level:
    root: INFO
    com.gembud: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.csrf: TRACE
