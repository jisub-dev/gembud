<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 - Gembud</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0e0e10;
        color: #f4f4f5;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid #3f3f46;
        border-radius: 14px;
        background: #18181b;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        color: #d4d4d8;
        line-height: 1.5;
      }
      button {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        background: #2563eb;
        color: white;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결을 확인한 뒤 다시 시도해 주세요. 연결이 복구되면 자동으로 최신 데이터가 반영됩니다.</p>
      <button onclick="location.reload()">다시 시도</button>
    </div>
  </body>
  </html>
